services:
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
        restart: unless-stopped
        depends_on:
            database:
                condition: service_healthy
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            APP_URL: ${APP_URL:-http://localhost:8080}
            APP_KEY: ${APP_KEY}
            APP_LOCALE: ${APP_LOCALE:-ru}
            DB_CONNECTION: pgsql
            DB_HOST: database
            DB_PORT: 5432
            DB_DATABASE: ${DB_DATABASE:-netroom}
            DB_USERNAME: ${DB_USERNAME:-netroom}
            DB_PASSWORD: ${DB_PASSWORD:-netroom}
            SESSION_DRIVER: database
            QUEUE_CONNECTION: database
            CACHE_STORE: database
        ports:
            - '${APP_PORT:-8080}:8080'
        volumes:
            - storage:/app/storage

    database:
        image: postgres:18-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE:-netroom}
            POSTGRES_USER: ${DB_USERNAME:-netroom}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-netroom}
        volumes:
            - database:/var/lib/postgresql/data
        healthcheck:
            test:
                ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-netroom} -d ${DB_DATABASE:-netroom}']
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    database:
    storage:
