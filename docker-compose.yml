services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: netroom
      DB_USERNAME: netroom
      DB_PASSWORD: netroom
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netroom
      POSTGRES_USER: netroom
      POSTGRES_PASSWORD: netroom
    volumes:
      - netroom-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netroom"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  netroom-db:
